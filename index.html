
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{padding:1.25rem 1rem 2rem;font-family:var(--font-sans, Arial, Helvetica, sans-serif);max-width:720px;margin:0 auto}
.progress-bg{height:6px;background:var(--color-border-tertiary);border-radius:3px;margin-bottom:1.25rem}
.progress-fill{height:6px;background:#7F77DD;border-radius:3px;transition:width 0.3s}
.q-num{font-size:16px;color:var(--color-text-secondary);margin-bottom:8px;line-height:1.4}
.q-text{font-size:21px;font-weight:600;color:var(--color-text-primary);margin-bottom:1.35rem;line-height:1.45}
.options{display:flex;flex-direction:column;gap:14px;margin-bottom:1.6rem}
.opt{background:var(--color-background-primary);border:1px solid var(--color-border-secondary);border-radius:var(--border-radius-lg, 16px);padding:18px;text-align:left;cursor:pointer;font-size:18px;color:var(--color-text-primary);line-height:1.5;display:flex;align-items:flex-start;gap:12px;width:100%;min-height:64px}
.opt:active{background:var(--color-background-secondary)}
.opt.sel{border:2px solid #7F77DD;background:#EEEDFE;color:#3C3489}
.opt-letter{font-weight:700;min-width:26px;color:var(--color-text-secondary);font-size:18px;padding-top:1px;flex-shrink:0}
.opt.sel .opt-letter{color:#534AB7}
.nav{display:flex;justify-content:space-between;align-items:center;gap:10px}
.btn{background:transparent;border:1px solid var(--color-border-secondary);border-radius:var(--border-radius-md, 12px);padding:15px 20px;font-size:18px;font-weight:600;cursor:pointer;color:var(--color-text-primary);flex:1;min-height:52px}
.btn:active{transform:scale(0.98)}
.btn.primary{background:#534AB7;color:#fff;border-color:#534AB7}
.btn:disabled{opacity:0.3;cursor:default}
.screen-start{display:flex;flex-direction:column;align-items:center;padding:1.25rem 0.25rem 2rem;gap:1.25rem}
.start-title{font-size:28px;font-weight:700;color:var(--color-text-primary);text-align:center;line-height:1.25}
.start-sub{font-size:18px;color:var(--color-text-secondary);text-align:center;line-height:1.5}
.gender-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%}
.gender-btn{background:var(--color-background-primary);border:1px solid var(--color-border-secondary);border-radius:var(--border-radius-lg, 16px);padding:22px 12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:10px;min-height:104px}
.gender-btn:active{background:var(--color-background-secondary)}
.gender-icon{font-size:28px}
.gender-label{font-size:18px;font-weight:700;color:var(--color-text-primary)}
.result-wrap{padding:0.5rem 0}
.res-title{font-size:26px;font-weight:700;color:var(--color-text-primary);margin-bottom:6px;line-height:1.25}
.res-sub{font-size:18px;color:var(--color-text-secondary);margin-bottom:1.25rem;line-height:1.45}
.winner-card{background:#EEEDFE;border:2px solid #7F77DD;border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1.25rem}
.w-icon{font-size:30px;margin-bottom:8px}
.w-name{font-size:22px;font-weight:700;color:#3C3489;margin-bottom:8px;line-height:1.3}
.w-desc{font-size:18px;color:#534AB7;line-height:1.55}
.score-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:1.5rem}
.score-item{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px 14px}
.score-item.win{border:2px solid #7F77DD;background:#EEEDFE}
.s-label{font-size:17px;font-weight:700;margin-bottom:8px;color:var(--color-text-secondary);line-height:1.35}
.score-item.win .s-label{color:#3C3489}
.s-bg{height:6px;background:var(--color-border-tertiary);border-radius:3px;margin-bottom:4px}
.s-fill{height:6px;border-radius:3px;background:#7F77DD}
.score-item.win .s-fill{background:#534AB7}
.s-num{font-size:16px;color:var(--color-text-secondary)}
.score-item.win .s-num{color:#534AB7}
.btn-restart{background:transparent;border:1px solid var(--color-border-secondary);border-radius:var(--border-radius-md, 12px);padding:15px 20px;font-size:18px;font-weight:600;cursor:pointer;color:var(--color-text-primary);width:100%;min-height:52px}

.hero-img{width:min(82vw,360px);max-width:100%;border-radius:24px;box-shadow:0 10px 28px rgba(0,0,0,0.14);object-fit:cover;margin-bottom:0.25rem}
@media (max-width:480px){
  .wrap{padding:1rem 0.9rem 1.5rem}
  .q-text{font-size:22px}
  .opt{font-size:19px;padding:18px 16px}
  .start-title{font-size:30px}
  .gender-grid{gap:10px}
}
</style>

function setGender(g){
  gender=g;
  questions=g==='esposa'?qEsposa:qMarido;
  current=0;
  answers=new Array(questions.length).fill(null);
  render();
}

function renderQ(app){
  const q=questions[current];
  const sel=answers[current];
  const pct=Math.round((current/questions.length)*100);
  app.innerHTML=`
    <div class="progress-bg"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="q-num">Pergunta ${current+1} de ${questions.length}</div>
    <div class="q-text">${current+1}. Marque a alternativa que mais representa você:</div>
    <div class="options">
      <button class="opt${sel==='a'?' sel':''}" onclick="pick('a')">
        <span class="opt-letter">${q.a.l}</span>
        <span>${q.a.t}</span>
      </button>
      <button class="opt${sel==='b'?' sel':''}" onclick="pick('b')">
        <span class="opt-letter">${q.b.l}</span>
        <span>${q.b.t}</span>
      </button>
    </div>
    <div class="nav">
      <button class="btn" onclick="go(-1)" ${current===0?'disabled':''}>← Anterior</button>
      <button class="btn primary" onclick="go(1)" ${sel===null?'disabled':''}>${current===questions.length-1?'Ver resultado →':'Próxima →'}</button>
    </div>`;
}

function renderResult(app){
  const sc={A:0,B:0,C:0,D:0,E:0};
  for(let i=0;i<questions.length;i++){
    if(answers[i]==='a') sc[questions[i].a.l]++;
    else if(answers[i]==='b') sc[questions[i].b.l]++;
  }
  const max=Math.max(...Object.values(sc));
  const winner=Object.keys(sc).find(k=>sc[k]===max);
  const order=Object.entries(sc).sort((a,b)=>b[1]-a[1]);
  const p=profiles[winner];
  const total=questions.length;
  app.innerHTML=`<div class="result-wrap">
    <div class="res-title">Resultado do teste</div>
    <div class="res-sub">Sua linguagem do amor predominante é:</div>
    <div class="winner-card">
      <div class="w-icon" style="font-size:30px">${p.icon}</div>
      <div class="w-name">${p.name}</div>
      <div class="w-desc">${p.desc}</div>
    </div>
    <div class="score-grid">
      ${order.map(([l,s])=>{
        const pf=profiles[l];
        const pct=Math.round((s/total)*100);
        return `<div class="score-item${l===winner?' win':''}">
          <div class="s-label">${pf.icon} ${pf.name}</div>
          <div class="s-bg"><div class="s-fill" style="width:${pct}%"></div></div>
          <div class="s-num">${s} ponto${s!==1?'s':''} (${pct}%)</div>
        </div>`;
      }).join('')}
    </div>
    <button class="btn-restart" onclick="restart()">↺ Refazer o teste</button>
  </div>`;
}

function pick(c){answers[current]=c;render();}
function go(d){
  current+=d;
  if(current>=questions.length) current=questions.length;
  render();
}
function restart(){gender=null;current=0;answers=[];questions=[];render();}

render();
</script>
