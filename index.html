.btn{background:transparent;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:12px 20px;font-size:16px;cursor:pointer;color:var(--color-text-primary);flex:1}
.btn:active{transform:scale(0.98)}
.btn.primary{background:#534AB7;color:#fff;border-color:#534AB7}
.btn:disabled{opacity:0.3;cursor:default}
.screen-start{display:flex;flex-direction:column;align-items:center;padding:2rem 1rem;gap:1.25rem}
.start-title{font-size:20px;font-weight:500;color:var(--color-text-primary);text-align:center;line-height:1.4}
.start-sub{font-size:16px;color:var(--color-text-secondary);text-align:center;line-height:1.5}
.gender-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%}
.gender-btn{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:20px 12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:10px}

.result-wrap{padding:0.5rem 0}
.res-title{font-size:20px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px}
.res-sub{font-size:15px;color:var(--color-text-secondary);margin-bottom:1.25rem}
.winner-card{background:#EEEDFE;border:2px solid #7F77DD;border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1.25rem}
.w-icon{font-size:30px;margin-bottom:8px}
.w-name{font-size:18px;font-weight:500;color:#3C3489;margin-bottom:6px}
.w-desc{font-size:15px;color:#534AB7;line-height:1.6}
.score-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:1.5rem}
.score-item{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px 14px}
.score-item.win{border:2px solid #7F77DD;background:#EEEDFE}
.s-label{font-size:14px;font-weight:500;margin-bottom:6px;color:var(--color-text-secondary)}
.score-item.win .s-label{color:#3C3489}
.s-bg{height:6px;background:var(--color-border-tertiary);border-radius:3px;margin-bottom:4px}
.s-fill{height:6px;border-radius:3px;background:#7F77DD}

.s-num{font-size:13px;color:var(--color-text-secondary)}

.btn-restart{background:transparent;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:12px 20px;font-size:16px;cursor:pointer;color:var(--color-text-primary);width:100%}

  {a:{l:"C",t:"Receber presentes especiais de minha esposa é algo que me deixa feliz."},b:{l:"B",t:"Uma das coisas de que mais gosto é viajar com minha esposa."}},

const profiles={
  A:{name:"Palavras de afirmação",icon:"💬",desc:"Você se sente amado(a) quando recebe elogios, palavras encorajadoras e expressões verbais de carinho. Ouvir \"eu te amo\" e palavras de apoio é fundamental para você."},
  B:{name:"Tempo de qualidade",icon:"⏳",desc:"Você valoriza profundamente a atenção total e exclusiva do(a) parceiro(a). Estar junto, compartilhar momentos e sentir que é prioridade faz toda a diferença."},
  C:{name:"Receber presentes",icon:"🎁",desc:"Presentes simbolizam amor e atenção para você. Não é sobre o valor material, mas o gesto de pensar em você e demonstrar isso com um presente especial."},
  D:{name:"Atos de serviço",icon:"🤝",desc:"Ações falam mais alto que palavras. Quando seu(sua) parceiro(a) ajuda nas tarefas e alivia sua carga, você sente profundamente que é amado(a) e valorizado(a)."},
  E:{name:"Toque físico",icon:"❤",desc:"Abraços, beijos, carinhos e o toque físico são sua principal forma de conexão emocional. O contato físico comunica amor, segurança e proximidade."}
};

let gender=null, current=0, answers=[], questions=[];

function render(){
  const app=document.getElementById('app');
  if(!gender){renderStart(app);}
  else if(current<questions.length){renderQ(app);}
  else{renderResult(app);}
}

function renderStart(app){
  app.innerHTML=`<div class="screen-start">
    <div class="start-title">Teste das 5 linguagens do amor</div>
    <div class="start-sub">Quem vai responder o teste?</div>
    <div class="gender-grid">
      <button class="gender-btn" onclick="setGender('esposa')">
        <span class="gender-icon" style="font-size:28px">🌸</span>
        <span class="gender-label">Esposa</span>
      </button>
      <button class="gender-btn" onclick="setGender('marido')">
        <span class="gender-icon" style="font-size:28px">💙</span>
        <span class="gender-label">Marido</span>
      </button>
    </div>
  </div>`;
}

function setGender(g){
  gender=g;
  questions=g==='esposa'?qEsposa:qMarido;
  current=0;
  answers=new Array(questions.length).fill(null);
  render();
}

function renderQ(app){
  const q=questions[current];
  const sel=answers[current];
  const pct=Math.round((current/questions.length)*100);
  app.innerHTML=`
    <div class="progress-bg"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="q-num">Pergunta ${current+1} de ${questions.length}</div>
    <div class="q-text">${current+1}. Marque a alternativa que mais representa você:</div>
    <div class="options">
      <button class="opt${sel==='a'?' sel':''}" onclick="pick('a')">
        <span class="opt-letter">${q.a.l}</span>
        <span>${q.a.t}</span>
      </button>
      <button class="opt${sel==='b'?' sel':''}" onclick="pick('b')">
        <span class="opt-letter">${q.b.l}</span>
        <span>${q.b.t}</span>
      </button>
    </div>
    <div class="nav">
      <button class="btn" onclick="go(-1)" ${current===0?'disabled':''}>← Anterior</button>
      <button class="btn primary" onclick="go(1)" ${sel===null?'disabled':''}>${current===questions.length-1?'Ver resultado →':'Próxima →'}</button>
    </div>`;
}

function renderResult(app){
  const sc={A:0,B:0,C:0,D:0,E:0};
  for(let i=0;i<questions.length;i++){
    if(answers[i]==='a') sc[questions[i].a.l]++;
    else if(answers[i]==='b') sc[questions[i].b.l]++;
  }
  const max=Math.max(...Object.values(sc));
  const winner=Object.keys(sc).find(k=>sc[k]===max);
  const order=Object.entries(sc).sort((a,b)=>b[1]-a[1]);
  const p=profiles[winner];
  const total=questions.length;
  app.innerHTML=`<div class="result-wrap">
    <div class="res-title">Resultado do teste</div>
    <div class="res-sub">Sua linguagem do amor predominante é:</div>
    <div class="winner-card">
      <div class="w-icon" style="font-size:30px">${p.icon}</div>
      <div class="w-name">${p.name}</div>
      <div class="w-desc">${p.desc}</div>
    </div>
    <div class="score-grid">
      ${order.map(([l,s])=>{
        const pf=profiles[l];
        const pct=Math.round((s/total)*100);
        return `<div class="score-item${l===winner?' win':''}">
          <div class="s-label">${pf.icon} ${pf.name}</div>
          <div class="s-bg"><div class="s-fill" style="width:${pct}%"></div></div>
          <div class="s-num">${s} ponto${s!==1?'s':''} (${pct}%)</div>
        </div>`;
      }).join('')}
    </div>
    <button class="btn-restart" onclick="restart()">↺ Refazer o teste</button>
  </div>`;
}

function pick(c){answers[current]=c;render();}
function go(d){
  current+=d;
  if(current>=questions.length) current=questions.length;
  render();
}
function restart(){gender=null;current=0;answers=[];questions=[];render();}

render();
</script>
